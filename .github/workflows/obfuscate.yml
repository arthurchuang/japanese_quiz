name: Obfuscate and Deploy
on:
  push:
    branches:
      - main  # Runs every time you push to main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Obfuscator
        run: npm install -g javascript-obfuscator

      - name: Obfuscate JavaScript
        run: |
          npx javascript-obfuscator ./script.js --output ./dist/script.js --compact true --self-defending true
          # Move the obfuscated file back to the root so the HTML can find it
          mv ./dist/script.js ./script.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .