name: Obfuscate and Deploy
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Obfuscator
        run: npm install -g javascript-obfuscator

      - name: Obfuscate JavaScript
        run: |
          # Create a temporary directory for output
          mkdir -p ./dist
          
          # Obfuscate all .js files in the root directory
          # Using --output ./dist ensures we don't overwrite files while the tool is reading them
          npx javascript-obfuscator . --output ./dist --compact true --self-defending true
          
          # Move the obfuscated files back to the root so the HTML files can find them
          # This replaces your original JS files with the obfuscated versions before deployment
          cp -R ./dist/* .
          rm -rf ./dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .