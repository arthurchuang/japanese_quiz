name: Generate Daily Quiz

on:
  schedule:
    - cron: "40 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install @neosapience/typecast-js@latest

      - name: Run script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node generate_quiz.js

      - name: Generate recordings
        env:
          TYPECAST_API_KEY: ${{ secrets.TYPECAST_API_KEY }}
        run: node generate_quiz_recording.js

      - name: Commit results
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add quizzes/
          git diff --cached --quiet || git commit -m "Daily grammar quiz"
          git push