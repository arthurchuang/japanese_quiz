<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Japanese Quiz</title>

    <style>
        /* ─── Reset & base ───────────────────────────────────────────────────── */

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100svh;
            background-color: #f0f2f5;
            text-align: center;
            padding: 15px;
        }

        /* ─── Container ──────────────────────────────────────────────────────── */

        .quiz-container {
            background: pink;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }

        /* ─── Typography ─────────────────────────────────────────────────────── */

        h1 {
            font-size: 1.4rem;
            margin-bottom: 0.5em;
        }

        #progress {
            color: #666;
            font-size: 0.9rem;
        }

        #questionWord {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 1em 0;
            line-height: 1.4;
        }

        #feedback {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            min-height: 2em;
            color: #333;
        }

        #score {
            font-weight: bold;
            margin: 10px 0;
        }

        .date-header {
            font-weight: bold;
            margin-bottom: 5px;
            color: #888;
            font-size: 0.9rem;
        }

        /* ─── Buttons ────────────────────────────────────────────────────────── */

        .option {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 10px;
            background-color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.15s, border-color 0.15s;
        }

        .option:hover {
            background-color: #f5f5f5;
            border-color: #ddd;
        }

        .next-btn {
            margin-top: 10px;
            width: 100%;
            padding: 15px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .next-btn:hover {
            background-color: #0066CC;
        }

        .next-btn:disabled {
            background-color: #ccc;
            cursor: default;
        }

        #nextBtn {
            display: none;
        }

        /* ─── Loading ────────────────────────────────────────────────────────── */

        #loading {
            color: #888;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>

    <!-- ─── Quiz selection ──────────────────────────────────────────────────── -->
    <div id="quiz-list-screen" class="quiz-container">
        <h1>クイズを選びましょう</h1>
        <p id="loading">Loading available quizzes...</p>
        <div id="quizList"></div>
    </div>

    <!-- ─── Quiz screen ─────────────────────────────────────────────────────── -->
    <div id="quiz-screen" class="quiz-container" style="display: none;">

        <p id="dateDisplay" class="date-header"></p>
        <h1>今日の練習(AI生成)</h1>

        <p id="progress"></p>
        <div id="questionWord"></div>

        <div id="options"></div>

        <p id="feedback"></p>
        <p id="score"></p>

        <button id="nextBtn" class="next-btn" disabled>Next Question →</button>
        <button id="refreshBtn" class="next-btn" style="display: none;" onclick="location.reload()">
            もう一度挑戦する!
        </button>

    </div>

    <script src="ai_quiz.js"></script>

</body>

</html>
