<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily AI Quiz</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      background-color: #f0f2f5;
      text-align: center;
      padding: 15px;
    }

    .quiz-container {
      background: gold;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 1.4rem;
      color: #1a1a1a;
      margin-bottom: 0.5em;
    }

    #progress {
      color: #666;
      font-size: 0.9rem;
      margin: 0;
    }

    #questionWord {
      font-size: 1.8rem;
      font-weight: bold;
      color: black;
      margin: 1em 0;
    }

    .option {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 14px;
      cursor: pointer;
      border: 2px solid #eee;
      border-radius: 10px;
      background-color: #fff;
      font-size: 1rem;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .option.selected {
      background-color: #e0e0e0;
      border-color: #bdbdbd;
    }

    #feedback {
      margin-top: 15px;
      font-weight: 600;
      min-height: 3em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #score {
      font-weight: bold;
      margin: 10px 0;
    }

    .next-btn {
      margin-top: 10px;
      width: 100%;
      padding: 15px;
      background-color: #007AFF;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .next-btn:active {
      opacity: 0.8;
    }

    .next-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    #nextBtn {
      display: none;
    }

    .date-header {
      padding: 10px 20px;
      font-family: "Meiryo", sans-serif;
      font-weight: bold;
      color: #333;
      font-size: 1rem;
    }

    #loading {
      font-size: 1rem;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="quiz-container">

    <!-- Loading state -->
    <p id="loading">Loading today's quiz...</p>

    <!-- Date -->
    <p id="dateDisplay" class="date-header"></p>

    <h1>今日の文法クイズ</h1>

    <!-- Question Section -->
    <div id="question-section">
      <p id="progress"></p>
      <p id="questionWord"></p>
    </div>

    <!-- Options -->
    <div id="options"></div>

    <!-- Feedback + Score -->
    <p id="feedback"></p>
    <p id="score"></p>

    <!-- Buttons -->
    <button id="nextBtn" class="next-btn" disabled>Next Question</button>
    <button id="refreshBtn" class="next-btn" style="display: none;" onclick="location.reload()">もう一度挑戦する!</button>

  </div>

  <script src="ai_quiz.js"></script>

</body>
</html>
