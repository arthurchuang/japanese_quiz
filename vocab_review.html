<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Quiz - Detailed Review</title>

    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: #7f8c8d;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .jp-cell {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .wrong-cell {
            color: #e74c3c;
            font-weight: 500;
        }

        .correct-cell {
            color: #27ae60;
            font-weight: bold;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-subtext {
            display: block;
            /* Forces it to a new line */
            margin-top: 4px;
        }

        .back-btn {
            background-color: #3498db;
            color: white;
            text-align: center;
            display: inline-block;
            /* Ensures the button expands to fit both lines */
            padding: 10px 20px;
        }

        .back-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="score-container">
            <h1 id="finalScore"></h1>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Question</th>
                    <th>Your Pick</th>
                    <th>Correct Answer</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>

        <div class="actions">
            <a href="index.html" class="btn back-btn">
                大丈夫です!
                <span class="btn-subtext">もう一度挑戦しましょう</span>
            </a>
        </div>
    </div>

    <script src="vocab_review.js"></script>
</body>

</html>
