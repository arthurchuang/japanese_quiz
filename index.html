<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese vs. Mandarin Quiz</title>
  <style>
    /* Resetting box-sizing for easier layout math */
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* Use svh for mobile toolbars */
      min-height: 100svh;
      background-color: #f0f2f5;
      text-align: center;
      padding: 15px;
      /* Keeps content away from screen edges */
    }

    .quiz-container {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      width: 100%;
      max-width: 400px;
      /* Perfect width for most smartphones */
    }

    h1 {
      font-size: 1.4rem;
      color: #1a1a1a;
      margin-bottom: 0.5em;
    }

    #progress {
      color: #666;
      font-size: 0.9rem;
      margin: 0;
    }

    #japaneseWord {
      font-size: 1.8rem;
      font-weight: bold;
      color: #d32f2f;
      /* Nice red for Japanese accent */
      margin: 1em 0;
    }

    /* Make buttons large and easy to tap with a thumb */
    .option {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 14px;
      cursor: pointer;
      border: 2px solid #eee;
      border-radius: 10px;
      background-color: #fff;
      font-size: 1rem;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      /* Removes blue flash on iPhone tap */
    }

    /* Define the selected state */
    .option.selected {
      background-color: #e0e0e0;
      /* The grey highlight */
      border-color: #bdbdbd;
    }

    #feedback {
      margin-top: 15px;
      font-weight: 600;
      min-height: 3em;
      /* Prevents layout jumping when text appears */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #score {
      font-weight: bold;
      margin: 10px 0;
    }

    .next-btn {
      margin-top: 10px;
      width: 100%;
      padding: 15px;
      background-color: #007AFF;
      /* iPhone "Link Blue" */
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .next-btn:active {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="quiz-container">
    <h1>にほんごをべんきょうしましょう!</h1>
    <p id="progress"></p>
    <p id="japaneseWord"></p>
    <div id="options"></div>
    <p id="feedback"></p>
    <p id="score"></p>
    <button class="next-btn" onclick="nextQuestion()">Next Question</button>
  </div>
  <script>
    // Hardcoded vocabulary list
    const data = [
      { japanese: "たかい", mandarin: "昂貴的/高的" },
      { japanese: "あたらしい", mandarin: "新的" },
      { japanese: "つよい", mandarin: "強的/強壯的" },
      { japanese: "はやい", mandarin: "快的" },
      { japanese: "ひろい", mandarin: "寬敞的" },
      { japanese: "あたたかい", mandarin: "溫暖的" },
      { japanese: "かるい", mandarin: "輕的" },
      { japanese: "くらい", mandarin: "黑暗的" },
      { japanese: "くらい", mandarin: "沮喪的" },
      { japanese: "ちかい", mandarin: "鄰近的" },
      { japanese: "ながい", mandarin: "長的" },
      { japanese: "おもしろい", mandarin: "有趣的" },
      { japanese: "ふとい", mandarin: "粗的" },
      { japanese: "ふかい", mandarin: "深的" },
      { japanese: "いそがしい", mandarin: "忙碌的" },
      { japanese: "ただしい", mandarin: "正確的" },
      { japanese: "たのしい", mandarin: "快樂的" },
      { japanese: "したしい", mandarin: "親密的" },
      { japanese: "ふるい", mandarin: "舊的" },
      { japanese: "わるい", mandarin: "壞的" },
      { japanese: "やすい", mandarin: "便宜的" },
      { japanese: "ひくい", mandarin: "矮的" },
      { japanese: "まずい", mandarin: "難吃的" },
      { japanese: "つめたい", mandarin: "冰的 / 冷的" },
      { japanese: "うすい", mandarin: "薄的" },
      { japanese: "よわい", mandarin: "效力弱的" },
      { japanese: "おそい", mandarin: "慢的" },
      { japanese: "せまい", mandarin: "狹小的" },
      { japanese: "すずしい", mandarin: "涼爽的" },
      { japanese: "おもい", mandarin: "沉重的" },
      { japanese: "あかるい", mandarin: "明亮的" },
      { japanese: "とおい", mandarin: "遙遠的" },
      { japanese: "みじかい", mandarin: "短的" },
      { japanese: "つまらない", mandarin: "無聊的" },
      { japanese: "ほそい", mandarin: "細的" },
      { japanese: "あさい", mandarin: "淺的" },
      { japanese: "おおい", mandarin: "多的" },
      { japanese: "すくない", mandarin: "少的" },
      { japanese: "むずかしい", mandarin: "很難的" },
      { japanese: "あまい", mandarin: "甜的" },
      { japanese: "やさしい", mandarin: "親切的" },
      { japanese: "からい", mandarin: "辣的" },
      { japanese: "まるい", mandarin: "圓的" },
      { japanese: "あぶない", mandarin: "危險的" },
      { japanese: "きたない", mandarin: "髒的／不乾淨的" },
      { japanese: "わかい", mandarin: "年輕的" },
      { japanese: "ほしい", mandarin: "想要的" },
      { japanese: "あおい", mandarin: "藍色的" },
      { japanese: "あかい", mandarin: "紅色的" },
      { japanese: "きいろい", mandarin: "黃色的" },
      { japanese: "くろい", mandarin: "黑色的" },
      { japanese: "きれいな", mandarin: "漂亮的／乾淨的" },
      { japanese: "すきな", mandarin: "喜歡的" },
      { japanese: "べんりな", mandarin: "方便的" },
      { japanese: "じょうずな", mandarin: "擅長的" },
      { japanese: "とくいな", mandarin: "拿手的" },
      { japanese: "しずかな", mandarin: "安靜的" },
      { japanese: "かんたんな", mandarin: "簡單的" },
      { japanese: "たいへんな", mandarin: "辛苦的／糟糕的" },
      { japanese: "げんきな", mandarin: "有精神的／健康的" },
      { japanese: "じょうぶな", mandarin: "強壯的／堅固的" },
      { japanese: "にぎやかな", mandarin: "熱鬧的" },
      { japanese: "ひまな", mandarin: "有空的" },
      { japanese: "ゆうめいな", mandarin: "有名的" },
      { japanese: "いろいろな", mandarin: "各種各樣的" },
      { japanese: "たいせつな", mandarin: "重要的" },
      { japanese: "だいじょうぶな", mandarin: "沒問題的" },
      { japanese: "まっすぐな", mandarin: "筆直的" },
      { japanese: "ぶすな", mandarin: "醜的 (俚語/粗俗)" },
      { japanese: "きらいな", mandarin: "討厭的" },
      { japanese: "ふべんな", mandarin: "不方便的" },
      { japanese: "へたな", mandarin: "不擅長的" },
      { japanese: "にがてな", mandarin: "不擅長／討厭的" },
      { japanese: "らくな", mandarin: "輕鬆的" }
    ];

    // Quiz variables
    let unusedQuestions = [...data];
    let current = {};
    let score = 0;
    let totalQuestions = data.length;
    let hasAttempted = false;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function nextQuestion() {
      const feedback = document.getElementById("feedback");
      feedback.textContent = "";
      hasAttempted = false;

      if (unusedQuestions.length === 0) {
        document.getElementById("japaneseWord").textContent = "🎉 Quiz Complete!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("progress").textContent = "";
        return;
      }

      const index = Math.floor(Math.random() * unusedQuestions.length);
      current = unusedQuestions.splice(index, 1)[0];

      document.getElementById("japaneseWord").textContent = current.japanese;
      document.getElementById("progress").textContent = `Question ${totalQuestions - unusedQuestions.length} / ${totalQuestions}`;
      document.getElementById("score").textContent = `Score: ${score}`;

      let distractors = data.filter(d => d.mandarin !== current.mandarin);
      distractors = shuffle(distractors).slice(0, 3).map(d => d.mandarin);

      const options = shuffle([current.mandarin, ...distractors]);
      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.textContent = opt;
        btn.className = "option";
        btn.onclick = () => {
          // 1. Remove .selected from any other option button
          const existingSelected = optionsDiv.querySelector('.option.selected');
          if (existingSelected) {
            existingSelected.classList.remove('selected');
          }

          // 2. Add .selected to the button that was just clicked
          btn.classList.add('selected');

          // 3. Quiz logic (checking the answer)
          if (opt === current.mandarin) {
            feedback.textContent = "✅ Correct!";
            feedback.style.color = "#2e7d32";
            if (!hasAttempted) {
              score++;
              hasAttempted = true;
            }
          } else {
            feedback.textContent = `❌ Incorrect. The answer is: ${current.mandarin}`;
            feedback.style.color = "#c62828";
            hasAttempted = true;
          }
          document.getElementById("score").textContent = `Score: ${score}`;
        };
        optionsDiv.appendChild(btn);
      });
    }

    nextQuestion();
  </script>

</body>

</html>
