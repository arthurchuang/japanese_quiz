<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Quiz</title>
  <style>
    /* Resetting box-sizing for easier layout math */
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* Use svh for mobile toolbars */
      min-height: 100svh;
      background-color: #f0f2f5;
      text-align: center;
      padding: 15px;
      /* Keeps content away from screen edges */
    }

    .quiz-container {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      width: 100%;
      max-width: 400px;
      /* Perfect width for most smartphones */
    }

    h1 {
      font-size: 1.4rem;
      color: #1a1a1a;
      margin-bottom: 0.5em;
    }

    #progress {
      color: #666;
      font-size: 0.9rem;
      margin: 0;
    }

    #questionWord {
      font-size: 1.8rem;
      font-weight: bold;
      color: #d32f2f;
      /* Nice red for Japanese accent */
      margin: 1em 0;
    }

    /* Make buttons large and easy to tap with a thumb */
    .option {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 14px;
      cursor: pointer;
      border: 2px solid #eee;
      border-radius: 10px;
      background-color: #fff;
      font-size: 1rem;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      /* Removes blue flash on iPhone tap */
    }

    /* Define the selected state */
    .option.selected {
      background-color: #e0e0e0;
      /* The grey highlight */
      border-color: #bdbdbd;
    }

    #feedback {
      margin-top: 15px;
      font-weight: 600;
      min-height: 3em;
      /* Prevents layout jumping when text appears */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #score {
      font-weight: bold;
      margin: 10px 0;
    }

    .next-btn {
      margin-top: 10px;
      width: 100%;
      padding: 15px;
      background-color: #007AFF;
      /* iPhone "Link Blue" */
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .next-btn:active {
      opacity: 0.8;
    }

    .date-header {
      padding: 10px 20px;
      font-family: "Meiryo", sans-serif;
      font-weight: bold;
      color: #333;
      font-size: 1rem;
    }
  </style>
</head>

<body>

  <!-- <div id="dateDisplay" class="date-header"></div> -->
  <div class="quiz-container">
    <p id="dateDisplay" class="date-header"></p>
    <h1>にほんごをべんきょうしましょう!</h1>
    <p id="progress"></p>
    <p id="questionWord"></p>
    <div id="options"></div>
    <p id="feedback"></p>
    <p id="score"></p>
    <button id="nextBtn" class="next-btn" onclick="nextQuestion()">Next Question</button>
    <button id="refreshBtn" class="next-btn" style="display: none;" onclick="location.reload()">もう一度挑戦する!</button>
  </div>
  <script src="script.js"></script>

</body>

</html>
