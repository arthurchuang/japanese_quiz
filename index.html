<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Quiz Menu</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100svh;
            background: linear-gradient(to top,
                    #1a3a5c 0%,
                    /* deep midnight blue */
                    #2e6ea6 20%,
                    /* ocean blue */
                    #6aaed6 38%,
                    /* clear sky */
                    #a8cfe8 50%,
                    /* soft blue transition */
                    #c4d4e0 54%,
                    /* blue fading */
                    #d4c8d0 57%,
                    /* blue-pink midpoint */
                    #dcc4cc 60%,
                    /* warming pink */
                    #e0bcc4 65%,
                    /* blue-pink blend */
                    #e0bcc4 68%,
                    /* hold blue-pink blend */
                    #f7d4c8 82%,
                    /* soft petal */
                    #fce8e2 91%,
                    /* morning haze */
                    #fff5f0 100%
                    /* pale spring sky */
                );
            text-align: center;
            padding: 15px;
        }

        h1 {
            font-size: 1.4rem;
            color: #1a1a1a;
            margin-bottom: 0.5em;
        }

        .quiz-container {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 400px;
        }


        /* Selection Menu Styles */
        .menu-btn {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 20px;
            background-color: #ffffff;
            color: #007AFF;
            border: 2px solid #007AFF;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .menu-btn:active {
            background-color: #007AFF;
            color: white;
            transform: scale(0.98);
        }

        /* Sub-text for the buttons */
        .btn-desc {
            display: block;
            font-size: 0.8rem;
            font-weight: normal;
            margin-top: 5px;
            color: #666;
        }
    </style>
</head>

<body>

    <div class="quiz-container">
        <h1>にほんごをべんきょうしましょう!</h1>
        <div id="quiz-menu">
            <button class="menu-btn" onclick="startQuiz('vocab')">
                語彙
                <span class="btn-desc">Vocabulary Practice</span>
            </button>
            <button class="menu-btn" onclick="startQuiz('grammar')">
                文法
                <span class="btn-desc">Grammar Practice</span>
            </button>
            <button class="menu-btn" onclick="startQuiz('daily')">
                今日のクイズ
                <span class="btn-desc">AI-generated quiz for today</span>
            </button>
        </div>
    </div>

    <script>
        function startQuiz(mode) {
            if (mode === 'grammar') {
                window.location.href = 'grammar.html';
            } else if (mode === 'vocab') {
                window.location.href = 'vocab.html';
            } else if (mode === 'daily') {
                window.location.href = 'ai_quiz.html';
            }
        }
    </script>

</body>

</html>
