<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Quiz Menu</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100svh;
            background-color: #f0f2f5;
            text-align: center;
            padding: 15px;
        }

        h1 {
            font-size: 1.4rem;
            color: #1a1a1a;
            margin-bottom: 0.5em;
        }

        .quiz-container {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 400px;
        }


        /* Selection Menu Styles */
        .menu-btn {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 20px;
            background-color: #ffffff;
            color: #007AFF;
            border: 2px solid #007AFF;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .menu-btn:active {
            background-color: #007AFF;
            color: white;
            transform: scale(0.98);
        }

        /* Sub-text for the buttons */
        .btn-desc {
            display: block;
            font-size: 0.8rem;
            font-weight: normal;
            margin-top: 5px;
            color: #666;
        }
    </style>
</head>

<body>

    <div class="quiz-container">
        <h1>にほんごをべんきょうしましょう!</h1>
        <div id="quiz-menu">
            <button class="menu-btn" onclick="startQuiz('vocab')">
                語彙 (Vocab)
                <span class="btn-desc">Vocabulary Practice</span>
            </button>
            <button class="menu-btn" onclick="startQuiz('grammar')">
                文法 (Grammar)
                <span class="btn-desc">Grammar Practice</span>
            </button>
        </div>
    </div>

    <script>
        function startQuiz(mode) {
            if (mode == 'grammar') {
                window.location.href = 'grammar.html';
            } else if (mode == 'vocab') {
                window.location.href = 'vocab.html';
            }

            const script = document.createElement('script');
            script.src = mode === 'vocab' ? 'vocab.js' : 'grammar.js';

            script.onload = () => {
                if (typeof displayQuestion === "function") {
                    displayQuestion();
                } else if (typeof nextQuestion === "function") {
                    nextQuestion();
                }
            };

            document.body.appendChild(script);
        }
    </script>

</body>

</html>
